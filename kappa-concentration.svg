<svg viewBox="0 0 980 420" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI','Arial','Helvetica Neue',sans-serif" role="img">
  <title>Liquidity Concentration: BrownFi vs Uniswap V3</title>

  <!-- ── Background ── -->
  <rect width="980" height="420" fill="#0D0A06" rx="14"/>
  <rect x="0.5" y="0.5" width="979" height="419" fill="none" stroke="#251A0C" stroke-width="1" rx="14"/>

  <!-- ── Title ── -->
  <text x="490" y="32" text-anchor="middle" font-size="19" font-weight="bold" fill="#F2EDE6" letter-spacing="0.2">Liquidity Concentration: BrownFi vs Uniswap V3</text>

  <!-- ── Top rule ── -->
  <line x1="24" y1="46" x2="956" y2="46" stroke="#1E1408" stroke-width="1"/>

  <!-- ── Section headers ── -->
  <!--  BROWNFI: centered in left half  (midpoint of x=80 to x=490 → 285) -->
  <text x="285" y="68" text-anchor="middle" font-size="13" font-weight="700" fill="#C47429" letter-spacing="1.6">BROWNFI</text>

  <!--  UNISWAP V3: centered in right half (midpoint of x=490 to x=900 → 695) -->
  <text x="695" y="68" text-anchor="middle" font-size="13" font-weight="700" fill="#FF007A" letter-spacing="1.6">UNISWAP V3</text>

  <!-- ── Header rule ── -->
  <line x1="24" y1="78" x2="956" y2="78" stroke="#1E1408" stroke-width="1"/>


  <!-- ════════════════════════════════════════════════
       BARS  —  all centered at x=490
       half-widths: 45 / 75 / 116 / 168 / 224 / 280
       row height 44 px, gap 10 px, first bar top y=90
       ════════════════════════════════════════════════ -->

  <!-- K=0.001  x=445–535  y=90–134 -->
  <rect x="445" y="90"  width="90"  height="44" fill="#6B2A0A" rx="4"/>
  <rect x="446" y="91"  width="88"  height="1.5" fill="#9B4A20" opacity="0.45"/>

  <!-- K=0.01   x=415–565  y=144–188 -->
  <rect x="415" y="144" width="150" height="44" fill="#8A3C14" rx="4"/>
  <rect x="416" y="145" width="148" height="1.5" fill="#BA5C28" opacity="0.45"/>

  <!-- K=0.1    x=374–606  y=198–242 -->
  <rect x="374" y="198" width="232" height="44" fill="#AA561C" rx="4"/>
  <rect x="375" y="199" width="230" height="1.5" fill="#D47832" opacity="0.45"/>

  <!-- K=0.5    x=322–658  y=252–296 -->
  <rect x="322" y="252" width="336" height="44" fill="#C87230" rx="4"/>
  <rect x="323" y="253" width="334" height="1.5" fill="#E89448" opacity="0.45"/>

  <!-- K=1      x=266–714  y=306–350 -->
  <rect x="266" y="306" width="448" height="44" fill="#D89450" rx="4"/>
  <rect x="267" y="307" width="446" height="1.5" fill="#F0B670" opacity="0.45"/>

  <!-- K=2      x=210–770  y=360–404 -->
  <rect x="210" y="360" width="560" height="44" fill="#E6BC76" rx="4"/>
  <rect x="211" y="361" width="558" height="1.5" fill="#F5D898" opacity="0.45"/>
  <text x="350" y="387" text-anchor="middle" font-size="17" font-weight="600" fill="#7A5830" letter-spacing="0.3">equivalent to Uniswap V2</text>


  <!-- ── Center divider — drawn after bars, sits on top of them ── -->
  <line x1="490" y1="78" x2="490" y2="406" stroke="#666666" stroke-width="3"/>

  <!-- ════════════════════════════════════════════════
       KAPPA LABELS  —  right-aligned at x=80
       y = bar_top + 28  (slightly below center for optical balance)
       ════════════════════════════════════════════════ -->
  <text x="80" y="118" text-anchor="end" font-size="13"   font-weight="700" fill="#C47429">K=0.001</text>
  <text x="80" y="172" text-anchor="end" font-size="13"   font-weight="700" fill="#C47429">K=0.01</text>
  <text x="80" y="226" text-anchor="end" font-size="13"   font-weight="700" fill="#C47429">K=0.1</text>
  <text x="80" y="280" text-anchor="end" font-size="13"   font-weight="700" fill="#C47429">K=0.5</text>
  <text x="80" y="334" text-anchor="end" font-size="13"   font-weight="700" fill="#C47429">K=1</text>
  <text x="80" y="388" text-anchor="end" font-size="13"   font-weight="700" fill="#C47429">K=2</text>


  <!-- ════════════════════════════════════════════════
       BROWNFI EFFICIENCY  —  right-aligned 14 px left of bar left edge
       GREEN — outside the bars
       ════════════════════════════════════════════════ -->
  <!-- K=0.001  barLeft=445 → text x=431 -->
  <text x="431" y="118" text-anchor="end" font-size="18" font-weight="700" fill="#4ADE80">200×</text>
  <!-- K=0.01   barLeft=415 → text x=401 -->
  <text x="401" y="172" text-anchor="end" font-size="18" font-weight="700" fill="#4ADE80">100×</text>
  <!-- K=0.1    barLeft=374 → text x=360 -->
  <text x="360" y="226" text-anchor="end" font-size="18" font-weight="700" fill="#4ADE80">18×</text>
  <!-- K=0.5    barLeft=322 → text x=308 -->
  <text x="308" y="280" text-anchor="end" font-size="18" font-weight="700" fill="#4ADE80">4×</text>
  <!-- K=1      barLeft=266 → text x=252 -->
  <text x="252" y="334" text-anchor="end" font-size="18" font-weight="700" fill="#4ADE80">2×</text>
  <!-- K=2      barLeft=210 → text x=196 -->
  <text x="196" y="388" text-anchor="end" font-size="18" font-weight="700" fill="#7A9A6A">1×</text>


  <!-- ════════════════════════════════════════════════
       UNISWAP V3 RANGE  —  left-aligned 14 px right of bar right edge
       PINK — outside the bars
       ════════════════════════════════════════════════ -->
  <!-- K=0.001  barRight=535 → text x=549 -->
  <text x="549" y="118" text-anchor="start" font-size="16" fill="#E07898">±1%</text>
  <!-- K=0.01   barRight=565 → text x=579 -->
  <text x="579" y="172" text-anchor="start" font-size="16" fill="#E07898">±2%</text>
  <!-- K=0.1    barRight=606 → text x=620 -->
  <text x="620" y="226" text-anchor="start" font-size="16" fill="#E07898">±10%</text>
  <!-- K=0.5    barRight=658 → text x=672 -->
  <text x="672" y="280" text-anchor="start" font-size="14.5" fill="#E07898">−55% / +82%</text>
  <!-- K=1      barRight=714 → text x=728 -->
  <text x="728" y="334" text-anchor="start" font-size="13.5" fill="#E07898">−75% / +405%</text>
  <!-- K=2      barRight=770 → text x=784 -->
  <text x="784" y="388" text-anchor="start" font-size="14.5" fill="#E07898">Full range</text>


  <!-- ── Footer rule ── -->
  <line x1="24" y1="410" x2="956" y2="410" stroke="#1E1408" stroke-width="1"/>

</svg>
